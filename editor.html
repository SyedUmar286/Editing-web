<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Quiz Editor</title>

<link rel="stylesheet" href="editor.css">
  
<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>  
<script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>

  
<link href="https://fonts.googleapis.com/css2?family=Poppins&family=Bangers&family=Lobster&family=Anton&family=Oswald&family=Montserrat&family=Raleway&family=Pacifico&family=Playfair+Display&family=Rubik&display=swap" rel="stylesheet">
  
</head>

<body>

<h2>Guess Video Editor</h2>

<div class="toolbar">

<label style="font-size: 11px; display: inline-flex; flex-direction: column-reverse; align-items: center; vertical-align: middle; margin-right: 10px;">
  <span>BG Color</span>
  <input type="color" id="bg" style="width: 40px; height: 30px; cursor: pointer;">
</label>
  
<div style="display: inline-flex; flex-direction: column; align-items: center; vertical-align: middle; background: #f0f0f0; padding: 5px; border: 1px solid #ccc; border-radius: 4px; margin-right: 15px;">
  <span style="font-size: 11px; font-weight: bold; margin-bottom: 5px; color: #333;">TEXT COLOR & MIX</span>
  <div style="display: flex; align-items: center; gap: 8px;">
    
    <div style="display: flex; flex-direction: column; align-items: center;">
      <input type="color" id="textColor" style="width: 35px; height: 30px; cursor: pointer; border: 1px solid #999; border-radius: 3px; padding: 0;">
      <span style="font-size: 9px; margin-top: 2px;">only one color</span>
    </div>

    <div style="width: 1px; height: 35px; background: #bbb;"></div>

    <div style="position: relative; display: flex; flex-direction: column; align-items: center;">
      <button onclick="toggleMixMenu()" id="mixBtn" style="background: linear-gradient(45deg, #f06, #4a90e2); color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 10px; font-weight: bold; height: 30px;">
        🎨 Mix
      </button>

      <div id="mixMenu" style="display: none; opacity: 0; transform: translateX(-50%) translateY(-10px); transition: all 0.3s ease; position: absolute; top: 40px; left: 50%; background: #ffffff; border: 1px solid #ddd; padding: 10px; border-radius: 8px; z-index: 1000; box-shadow: 0px 5px 15px rgba(0,0,0,0.2); min-width: 170px;">
        <span style="font-size: 10px; font-weight: bold; display: block; margin-bottom: 8px; color: #444;">Up to 5 Colors</span>
        <div style="display: flex; gap: 3px; margin-bottom: 10px; justify-content: center;">
          <input type="color" id="clr1" value="#ff0000" style="width: 25px; height: 25px; border-radius: 50%; border: 1px solid #ddd; cursor: pointer;">
          <input type="color" id="clr2" value="#00ff00" style="width: 25px; height: 25px; border-radius: 50%; border: 1px solid #ddd; cursor: pointer;">
          <input type="color" id="clr3" value="#0000ff" style="width: 25px; height: 25px; border-radius: 50%; border: 1px solid #ddd; cursor: pointer;">
          <input type="color" id="clr4" value="#ffff00" style="width: 25px; height: 25px; border-radius: 50%; border: 1px solid #ddd; cursor: pointer;">
          <input type="color" id="clr5" value="#ffffff" style="width: 25px; height: 25px; border-radius: 50%; border: 1px solid #ddd; cursor: pointer;">
        </div>
        <button onclick="addGradient()" style="width: 100%; padding: 5px; background: #333; color: white; border: none; border-radius: 4px; font-size: 10px; cursor: pointer;">Apply Magic Mix</button>
      </div>
      <span style="font-size: 9px; margin-top: 2px;">Gradient</span>
    </div>
  </div>
</div>
  
<label style="font-size: 12px; font-weight: bold; display: inline-flex; flex-direction: column; align-items: center; vertical-align: middle; background: #f0f0f0; padding: 5px; border: 1px solid #ccc; border-radius: 4px;">
  <span style="margin-bottom: 4px;">Add Layer (Choose Image)</span>
  <input type="file" id="upload" style="font-size: 11px; width: 180px;">
</label>
  
<button onclick="addText()">Text</button>
  
<div style="display: inline-flex; flex-direction: column; align-items: center; vertical-align: middle; margin: 0 10px;">
  <span style="font-size: 11px; margin-bottom: 5px; font-weight: bold; color: #333;">CHOOSE TEXT STYLE</span>
  <select id="fontFamily" style="padding: 5px; border-radius: 4px; border: 1px solid #ccc; cursor: pointer;">
    <option value="" disabled selected>Normal</option>
    <option value="Arial">Arial</option>
    <option value="Poppins">Poppins</option>
    <option value="Bangers">Bangers</option>
    <option value="Lobster">Lobster</option>
    <option value="Anton">Anton</option>
    <option value="Oswald">Oswald</option>
    <option value="Montserrat">Montserrat</option>
    <option value="Raleway">Raleway</option>
    <option value="Pacifico">Pacifico</option>
    <option value="Playfair Display">Playfair</option>
    <option value="Rubik">Rubik</option>
  </select>
</div>

<div style="display: inline-flex; flex-direction: column; align-items: center; vertical-align: middle; margin: 0 10px; border: 1px solid #ddd; padding: 5px; border-radius: 5px; background: #f9f9f9;">
  <span style="font-size: 10px; font-weight: bold; margin-bottom: 3px;">OUTLINE</span>
  <div style="display: flex; gap: 5px; align-items: center;">
    <input type="color" id="outlineColor" value="#000000" title="Outline Color" style="width: 30px; height: 25px; cursor: pointer;">
    <input type="number" id="outlineWidth" value="2" min="1" max="10" title="Outline Width" style="width: 40px; padding: 2px;">
    <button onclick="addOutline()" style="padding: 2px 8px;">Apply</button>
  </div>
</div>

<button onclick="addShadow()">Shadow</button>

</div>
  
<select id="emojiPicker">
<option>😀</option>
<option>😂</option>
<option>😍</option>
<option>😎</option>
<option>🔥</option>
<option>⭐</option>
<option>🎮</option>
<option>⚽</option>
<option>🏀</option>
<option>🎬</option>
<option>🚀</option>
<option>🌍</option>
<option>🍕</option>
<option>🍔</option>
<option>🐱</option>
<option>🐶</option>
<option>🦁</option>
<option>🐼</option>
<option>🌈</option>
<option>🎵</option>
</select>

<button onclick="addEmojiPicker()">Add Emoji</button>  

<input type="number" id="fontSize" placeholder="Size" style="width: 50px; padding: 5px;">
  
<button onclick="addEmoji()">Emoji</button>

<button onclick="addTimer()">Timer</button>

<button onclick="duplicate()">Duplicate</button>

<button onclick="undo()">Undo</button>
<button onclick="redo()">Redo</button>  

<button onclick="lockLayer()">Lock</button>

<button onclick="centerText()">Center</button>  

<button onclick="bringFront()">Bring Front</button>

<button onclick="sendBack()">Send Back</button>

<button onclick="deleteObject()">Delete</button>

<label style="font-size: 10px; display: inline-grid; vertical-align: middle; text-align: center;">
  Only Person
  <button onclick="removeBackground()" style="width: 100%;">Remove BG</button>
</label>
    
<button onclick="download()">Download</button>

</div>

<canvas id="canvas" width="900" height="600"></canvas>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/body-pix"></script>  
  
<script src="editor.js"></script>

</body>

</html>
